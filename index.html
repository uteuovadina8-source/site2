<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>TimeFlow Luxury</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap');

body {
  margin: 0;
  font-family: Inter;
  color: #f5e6e0;

  background:
    radial-gradient(circle at 20% 20%, #3a0d14 0%, transparent 35%),
    radial-gradient(circle at 80% 80%, #1a0b10 0%, transparent 40%),
    #07070a;
  overflow-x: hidden;
}

/* FLOAT LIGHTS */
.glow {
  position: absolute;
  border-radius: 50%;
  filter: blur(100px);
  opacity: 0.35;
  animation: float 10s infinite ease-in-out;
}

.g1 { width: 350px; height: 350px; background: #5a1a24; top: 10%; left: 10%; }
.g2 { width: 400px; height: 400px; background: #2b0f14; bottom: 10%; right: 10%; }

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(30px); }
}

/* NAV */
nav {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 18px;
}

nav button {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  color: #f5e6e0;
  padding: 10px 14px;
  border-radius: 14px;
  cursor: pointer;
  transition: 0.3s;
  backdrop-filter: blur(10px);
}

nav button:hover {
  background: linear-gradient(135deg,#5a1a24,#2b0f14);
  box-shadow: 0 0 25px rgba(90,26,36,0.4);
  transform: translateY(-2px);
}

/* PAGES */
.page {
  display: none;
  padding: 20px;
  animation: fade 0.5s ease;
}

.active { display: block; }

@keyframes fade {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1; transform: translateY(0);}
}

/* CARD */
.card {
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(18px);

  border: 1px solid rgba(122,42,53,0.25);

  padding: 22px;
  margin: 15px auto;
  max-width: 750px;

  border-radius: 18px;

  box-shadow:
    0 0 40px rgba(0,0,0,0.6),
    inset 0 0 10px rgba(255,255,255,0.03);

  transition: 0.3s;
}

.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 0 50px rgba(90,26,36,0.5);
}

/* INPUT */
input {
  padding: 10px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(0,0,0,0.4);
  color: #f5e6e0;
  margin: 5px;
  outline: none;
}

/* BUTTON */
button {
  padding: 10px 14px;
  border-radius: 12px;
  border: none;
  cursor: pointer;

  background: linear-gradient(135deg,#5a1a24,#2b0f14);
  color: #f5e6e0;

  font-weight: 600;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(90,26,36,0.5);
}

/* TEXT */
h1,h2 {
  margin: 0 0 10px;
}

/* TIMER */
#timer {
  font-size: 40px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="glow g1"></div>
<div class="glow g2"></div>

<nav>
  <button onclick="show('home')">Главная</button>
  <button onclick="show('tasks')">Задачи</button>
  <button onclick="show('stats')">Продуктивность</button>
  <button onclick="show('pomodoro')">Pomodoro</button>
</nav>

<!-- HOME -->
<div id="home" class="page active">
  <div class="card">
    <h1>TimeFlow Luxury</h1>
    <p>Контроль времени. Фокус. Результат.</p>
    <div id="clock"></div>
  </div>
</div>

<!-- TASKS -->
<div id="tasks" class="page">
  <div class="card">
    <h2>Задачи</h2>

    <input id="taskInput" placeholder="Новая задача">
    <button onclick="addTask()">Добавить</button>

    <div id="list"></div>
  </div>
</div>

<!-- STATS -->
<div id="stats" class="page">
  <div class="card">
    <h2>Продуктивность</h2>

    <input id="work" placeholder="Работа">
    <input id="rest" placeholder="Отдых">

    <button onclick="calc()">Рассчитать</button>

    <p id="result"></p>

    <canvas id="chart" width="300" height="300"></canvas>
  </div>
</div>

<!-- POMODORO -->
<div id="pomodoro" class="page">
  <div class="card">
    <h2>Pomodoro</h2>

    <input id="time" placeholder="25">
    <button onclick="startPomodoro()">Старт</button>
    <button onclick="stopPomodoro()">Стоп</button>

    <div id="timer">00:00</div>
  </div>
</div>

<script>

/* NAV */
function show(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* CLOCK */
setInterval(()=>{
  document.getElementById("clock").innerText =
    new Date().toLocaleTimeString();
},1000);

/* TASKS */
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function render(){
  document.getElementById("list").innerHTML = tasks.map((t,i)=>
    `<div>• ${t} <button onclick="del(${i})">x</button></div>`
  ).join("");

  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function addTask(){
  let v = taskInput.value;
  if(!v) return;

  tasks.push(v);
  taskInput.value = "";
  render();
}

function del(i){
  tasks.splice(i,1);
  render();
}

render();

/* PRODUCTIVITY */
function calc(){
  let w = +work.value;
  let r = +rest.value;

  let total = w + r;
  let wp = Math.round((w/total)*100);

  result.innerText = `Продуктивность: ${wp}%`;

  draw(wp);
}

function draw(wp){
  let ctx = chart.getContext("2d");
  ctx.clearRect(0,0,300,300);

  ctx.beginPath();
  ctx.fillStyle = "#5a1a24";
  ctx.moveTo(150,150);
  ctx.arc(150,150,100,0,Math.PI*2*wp/100);
  ctx.fill();

  ctx.beginPath();
  ctx.fillStyle = "#2b0f14";
  ctx.moveTo(150,150);
  ctx.arc(150,150,100,Math.PI*2*wp/100,Math.PI*2);
  ctx.fill();
}

/* POMODORO */
let timer = null;

function startPomodoro(){
  let time = +document.getElementById("time").value * 60;

  if(!time) return;

  clearInterval(timer);

  timer = setInterval(()=>{
    let m = Math.floor(time/60);
    let s = time%60;

    document.getElementById("timer").innerText =
      `${m}:${s<10?"0"+s:s}`;

    time--;

    if(time < 0){
      clearInterval(timer);
      document.body.style.background =
        "radial-gradient(circle,#3a0d14,#000)";
      alert("Сессия завершена");
    }
  },1000);
}

function stopPomodoro(){
  clearInterval(timer);
}

</script>

</body>
</html>
